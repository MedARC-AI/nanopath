project:
  name: nanopath-leader
  family: leader
  recipe_id: jepa-samplelist30
  output_dir: /data/$USER/nanopath/leader/leader
  wandb_dir: /data/$USER/nanopath/wandb

data:
  # dataset_dir holds the parquet shards (shard-NNNNN.parquet) that train.py reads.
  # `prepare.py … download=True` populates it from the medarc/nanopath HF mirror.
  dataset_dir: /data/nanopath_parquet
  split_seed: 42
  val_fraction: 0.05
  train_split: train
  val_split: val
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.32, 1.0]
  local_crop_scale: [0.05, 0.32]
  color_jitter: 0.15
  hed_jitter: 0.02

model:
  dim: 768
  depth: 20
  heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  rope_base: 10000
  registers: 4
  qk_norm: true
  qkv_bias: false
  projector_dim: 768

train:
  seed: 1337
  bf16: true
  activation_checkpointing: false
  # train.py derives per-rank batch_size as global_batch_size // world_size
  global_batch_size: 128
  num_workers: 8
  prefetch_factor: 4
  persistent_workers: true
  max_train_flops: 1000000000000000000 # 1.0e18
  warmup_flop_fraction: 0.0035
  warmdown_flop_fraction: 0.65
  final_lr_frac: 0.05
  eval_every: 500
  val_batches: 32
  log_every: 20
  save_every: 1000
  global_views: 2
  local_views: 4
  global_size: 224
  local_size: 96
  lambda_jepa_pred: 1.0
  lambda_sig: 0.05
  lr_ref: 1.5e-4
  weight_decay: 0.05
  grad_clip: 1.0
  ema_decay: 0.999
  resume: null

probe:
  enabled: true
  model_weights: ema
  count: 1 # 4 means probing at 25%, 50%, 75%, and 100% of the training FLOP budget. 1 means probing just at the end.
  datasets:
    - bach
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
  # Dataset roots are read by probe.py. Defaults are the MedARC cluster's
  # shared /block paths (already populated, zero setup). Off-cluster, point
  # these at writable directories and run prepare.py with download=True to
  # fetch the data.
  dataset_roots:
    bach: /block/eva-data/bach
    bracs: /block/eva-data/bracs
    break_his: /block/eva-data/breakhis
    mhist: /block/eva-data/mhist
    pcam: /block/eva-data/patch_camelyon
    pannuke: /block/thunder-data/pannuke
