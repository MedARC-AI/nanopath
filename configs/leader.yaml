project:
  name: nanopath-leader-dinov2
  family: leader
  recipe_id: dinov2-vits14-reg-kde
  output_dir: /data/$USER/nanopath/leader/dinov2-leader
  wandb_dir: /data/$USER/nanopath/wandb

data:
  # dataset_dir holds the parquet shards (shard-NNNNN.parquet) that train.py reads.
  # `prepare.py … download=True` populates it from the medarc/nanopath HF mirror.
  dataset_dir: /data/nanopath_parquet
  split_seed: 42
  val_fraction: 0.05
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.32, 1.0]
  local_crop_scale: [0.05, 0.32]
  color_jitter: 0.2
  color_jitter_saturation: 0.2
  hed_jitter: 0.05

model:
  type: dinov2_vits14_reg
  patch_size: 14

train:
  seed: 1337
  bf16: true
  activation_checkpointing: false
  global_batch_size: 128
  num_workers: 8
  prefetch_factor: 4
  persistent_workers: true
  max_train_flops: 100000000000000000 # 1.0e17, the leaderboard FLOP budget
  log_every: 20
  save_every: 1000
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 98
  resume: null

dino:
  # The three knobs we actively tune (see LOG.md for the sweep that picked the
  # current values); every other DINOv2 hyperparameter is a constant in train.py.
  lr: 1.0e-4
  kde_loss_weight: 0.002
  kde_concentration: 10.0

probe:
  enabled: true
  model_weights: ema
  count: 1 # 4 means probing at 25%, 50%, 75%, and 100% of the training FLOP budget. 1 means probing just at the end.
  datasets:
    - bach
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
  # Dataset roots are read by probe.py. Defaults are the MedARC cluster's
  # shared /block paths (already populated, zero setup). Off-cluster, point
  # these at writable directories and run prepare.py with download=True to
  # fetch the data.
  dataset_roots:
    bach: /block/eva-data/bach
    bracs: /block/eva-data/bracs
    break_his: /block/eva-data/breakhis
    mhist: /block/eva-data/mhist
    pcam: /block/eva-data/patch_camelyon
    pannuke: /block/thunder-data/pannuke
