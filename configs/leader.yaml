project:
  name: leader-dinov2
  family: leader
  recipe_id: dinov2-vits14-reg-kde
  output_dir: /data/$USER/nanopath/leader/default
  wandb_dir: /data/$USER/nanopath/wandb

data:
  # dataset_dir holds the parquet shards (shard-NNNNN.parquet) that train.py reads.
  # `prepare.py … download=True` populates it from the medarc/nanopath HF mirror.
  dataset_dir: /data/nanopath_parquet
  split_seed: 42
  val_fraction: 0.05
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.32, 1.0]
  local_crop_scale: [0.05, 0.32]
  color_jitter: 0.2
  color_jitter_saturation: 0.2
  hed_jitter: 0.05

model:
  type: dinov2_vits14_reg

train:
  seed: 1337
  bf16: true
  activation_checkpointing: false
  batch_size: 128
  num_workers: 8
  prefetch_factor: 4
  persistent_workers: true
  max_train_flops: 1000000000000000000 # 1.0e18, the leaderboard FLOP budget
  log_every: 20
  save_every: 1000
  # Validation pass every `eval_every` steps over `val_batches` held-out batches
  # (the bottom data.val_fraction of patient ids by hash). Cheap diagnostic, not used for selection.
  eval_every: 200
  val_batches: 16
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 98
  resume: null # optional explicit checkpoint path; null means always start fresh and wipe output_dir

dino:
  # DINOv2 recipe knobs. lr / kde_loss_weight / kde_concentration are the most-tuned
  # (see LOG.md sweeps); other values are established DINOv2 defaults that train.py
  # reads but we rarely change. Anything not listed here is hardcoded in train.py.
  lr: 1.0e-4
  lr_min: 1.0e-6
  warmup_flop_fraction: 0.0909
  freeze_last_layer_fraction: 0.0091
  layerwise_decay: 0.7
  patch_embed_lr_mult: 0.2
  drop_path_rate: 0.1
  head_hidden_dim: 2048
  head_bottleneck_dim: 384
  clip_grad: 3.0
  kde_loss_weight: 0.005
  kde_concentration: 10.0

probe:
  enabled: true
  model_weights: ema
  count: 1 # 4 means probing at 25%, 50%, 75%, and 100% of the training FLOP budget. 1 means probing just at the end.
  # bach + bracs were dropped: 3 of the original 5 classification probes (bach, bracs,
  # break_his) were all breast histology at varying granularities, so the suite over-counted
  # one tissue. Of the breast trio, break_his stays because it's still the most discriminating
  # (~0.58 linear F1 vs bach's ~0.98 saturation). Net: ~3 min saved per probe + better tissue
  # diversity (breast subtyping, colon polyp, lymph-node mets).
  datasets:
    - break_his
    - mhist
    - pcam
  # PanNuke (pan-cancer 6-class nuclei) + MoNuSAC (4-organ 5-class cell types, TCGA-derived) +
  # CoNSeP (UHCW colorectal 5-class cell types after HoVer-Net's standard 8→5 consolidation,
  # non-TCGA so it anchors the seg axis off our pretraining distribution). All feed seg_mean_jaccard.
  segmentation_datasets:
    - pannuke
    - monusac
    - consep
  # PathoROB (Kömen et al. 2025) downstream robustness eval: cosine kNN over the cls + mean
  # patch-token feature on each HF dataset, robustness_index = SO / (SO + OS) at the per-
  # dataset median k_opt from the preprint. tcga is intentionally excluded — TCGA tiles are
  # already in our pretraining universe, so a TCGA robustness measurement isn't held-out.
  robustness_datasets:
    - camelyon
    - tolkach_esca
  # Slide-level outcome probes:
  #   chimera_progression: bladder NMIBC progression (CHIMERA task 3). LR on 3A cohort (n=126),
  #     AUROC on held-out 3B cohort (n=50). Cache built via `sbatch submit/prepare_chimera.sbatch`.
  #   surgen_extras: colorectal extended-RAS (KRAS or NRAS mutation, SR1482 cohort). 5-fold
  #     stratified CV at the case level on n≈398 cases (~48% positive). Cache built via
  #     `sbatch submit/prepare_surgen.sbatch`.
  slide_datasets:
    - chimera_progression
    - surgen_extras
  # Dataset roots are read by probe.py. Defaults are the MedARC cluster's
  # shared /block paths (already populated, zero setup). Off-cluster, point
  # these at writable directories and run prepare.py with download=True to
  # fetch the data. The pathorob root holds parquet shards under <root>/<name>/
  # data/*.parquet.
  dataset_roots:
    break_his: /block/eva-data/breakhis
    mhist: /block/eva-data/mhist
    pcam: /block/eva-data/patch_camelyon
    pannuke: /block/thunder-data/pannuke
    monusac: /block/eva-data/monusac
    consep: /block/eva-data/consep
    pathorob: /block/eva-data/pathorob
    chimera_tiles: /data/chimera/chimera_tiles
    surgen_tiles: /data/surgen/surgen_tiles
