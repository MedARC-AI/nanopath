project:
  name: nanopath-small
  family: small
  recipe_id: jepa-samplelist30
  output_dir: /data/nanopath/small/small

data:
  sample_list: /block/TCGA/sample_dataset_30.txt
  sample_list_cache_dir: /data/nanopath/cache
  split_seed: 42
  val_fraction: 0.05
  train_split: train
  val_split: val
  max_open_wsi: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.32, 1.0]
  local_crop_scale: [0.05, 0.32]
  color_jitter: 0.15
  hed_jitter: 0.02

model:
  dim: 768
  depth: 20
  heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  rope_base: 10000
  registers: 4
  qk_norm: true
  qkv_bias: false
  projector_dim: 768

train:
  seed: 1337
  device: cuda
  bf16: true
  activation_checkpointing: false
  # SIGReg + JEPA all-gather depend on the global batch, so this is part of the recipe and stays fixed across hardware.
  # train.py derives per-rank batch_size as global_batch_size // world_size; mismatch errors out.
  global_batch_size: 128
  num_workers: 8
  prefetch_factor: 4
  persistent_workers: true
  max_train_flops: 1000000000000000000 # 1.0e18
  warmup_flop_fraction: 0.0035
  warmdown_flop_fraction: 0.65
  final_lr_frac: 0.05
  # Validation curves are required for debugging optimization; rank changes by final probe.
  eval_every: 500
  val_batches: 32
  log_every: 20
  save_every: 1000
  global_views: 2
  local_views: 4
  global_size: 224
  local_size: 96
  lambda_jepa_pred: 1.0
  lambda_sig: 0.05
  lr_ref: 1.5e-4
  weight_decay: 0.05
  grad_clip: 1.0
  ema_decay: 0.999
  resume: null

probe:
  enabled: true
  model_weights: ema
  count: 1 # 4 means probing at 25%, 50%, 75%, and 100% of the training FLOP budget. 1 means probing just at the end.
  datasets:
    - bach
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
