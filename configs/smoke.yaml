project:
  name: nanopath-smoke
  family: small
  recipe_id: jepa-samplelist30-v2
  output_dir: /data/nanopath/small/nanopath-smoke

data:
  sample_list: /block/TCGA/sample_dataset_30.txt
  sample_list_cache_dir: /data/nanopath/cache
  split_seed: 1337
  val_fraction: 0.05
  train_split: train
  val_split: val
  max_open_wsi: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.32, 1.0]
  local_crop_scale: [0.05, 0.32]
  color_jitter: 0.15
  hed_jitter: 0.02

model:
  dim: 768
  depth: 20
  heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  rope_base: 10000
  registers: 4
  qk_norm: true
  qkv_bias: false
  projector_dim: 768

train:
  seed: 1337
  device: cuda
  bf16: true
  activation_checkpointing: false
  # Single-GPU smoke; keep tiny so the whole train+probe loop finishes in a few minutes.
  global_batch_size: 16
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  max_train_flops: 200000000000000
  warmup_flop_fraction: 0.05
  warmdown_flop_fraction: 0.5
  final_lr_frac: 0.05
  eval_every: 10
  val_batches: 4
  log_every: 5
  save_every: 20
  global_views: 2
  local_views: 4
  global_size: 224
  local_size: 96
  lambda_jepa_pred: 1.0
  lambda_sig: 0.05
  lr_ref: 1.5e-4
  weight_decay: 0.05
  grad_clip: 1.0
  ema_decay: 0.999
  resume: null

probe:
  enabled: true
  model_weights: ema
  count: 1
  datasets:
    - bach
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
