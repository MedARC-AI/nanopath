project:
  name: new baseline (only jepa)
  family: nano
  recipe_id: jepa-samplelist30-v2
  output_dir: /data/nanopath/nano/new-baseline-only-jepa

data:
  sample_list: /block/TCGA/sample_dataset_30.txt
  sample_list_cache_dir: /data/nanopath/cache
  split_seed: 1337
  val_fraction: 0.05
  train_split: train
  val_split: val
  max_open_wsi: 64
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.5, 1.0]
  local_crop_scale: [0.2, 0.5]
  color_jitter: 0.15
  hed_jitter: 0.02

model:
  dim: 192
  depth: 5
  heads: 3
  patch_size: 16
  mlp_ratio: 4.0
  rope_base: 10000
  registers: 4
  qk_norm: true
  qkv_bias: false
  projector_dim: 192

train:
  seed: 1337
  device: cuda
  bf16: true
  activation_checkpointing: false
  batch_size: 32
  num_workers: 16
  prefetch_factor: 4
  persistent_workers: true
  max_train_flops: 5500000000000000
  # Warm up over about 0.35% of total train FLOPs; with the 5.5e15 budget this matches the old nano bs32 60-step warmup.
  warmup_flop_fraction: 0.0035
  # Validation only runs on these steps.
  eval_every: 200
  val_batches: 32
  log_every: 20
  save_every: 1000
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 96
  lambda_jepa_pred: 1.0
  lambda_sig: 0.05
  lr_ref: 5.0e-3
  batch_ref: 256
  weight_decay: 0.05
  grad_clip: 1.0
  cbs_doubling_steps: []
  resume: null

probe:
  enabled: true
  # Probe 4 times total at evenly spaced FLOP milestones; the final milestone is the end of the run.
  count: 4
  datasets:
    - bach
    - bracs
    - break_his
    - mhist
    - pcam
